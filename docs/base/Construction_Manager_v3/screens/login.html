<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8" />
<title>S01 ログイン — Construction Manager v3</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Serif+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/tokens.css">
<style>
  body {
    background:
      radial-gradient(ellipse at 20% 30%, color-mix(in oklab, var(--c-primary) 18%, var(--c-bg)) 0%, var(--c-bg) 55%),
      var(--c-bg);
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 20px;
  }
  [data-theme="dark"] body {
    background:
      radial-gradient(ellipse at 20% 30%, color-mix(in oklab, var(--c-primary) 30%, var(--c-bg)) 0%, var(--c-bg) 55%),
      var(--c-bg);
  }
  .login-shell {
    width: 100%;
    max-width: 920px;
    display: grid;
    grid-template-columns: 1.1fr 1fr;
    background: var(--c-surface);
    border-radius: var(--r-lg);
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(17,24,39,0.16), 0 4px 8px rgba(17,24,39,0.06);
    border: 1px solid var(--c-border);
    min-height: 540px;
  }

  /* Left brand panel */
  .brand-panel {
    background: var(--c-primary);
    color: #fff;
    padding: 36px 40px;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  .brand-panel::before {
    content: "";
    position: absolute;
    top: -120px; right: -100px;
    width: 360px; height: 360px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }
  .brand-panel::after {
    content: "";
    position: absolute;
    bottom: -200px; left: -120px;
    width: 380px; height: 380px;
    border-radius: 50%;
    background: rgba(255,255,255,0.03);
  }
  .brand-panel .logo {
    display: flex; align-items: center; gap: 12px;
    z-index: 1;
  }
  .brand-panel .logo .mark {
    width: 44px; height: 44px;
    background: #fff;
    color: var(--c-primary);
    border-radius: var(--r-md);
    display: grid; place-items: center;
    font-family: "Inter", sans-serif;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 1px;
  }
  .brand-panel .logo h2 {
    margin: 0;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .brand-panel .logo h2 small {
    display: block;
    font-weight: 400;
    color: rgba(255,255,255,0.7);
    font-size: 10px;
    letter-spacing: 0.1em;
    margin-top: 2px;
  }
  .brand-panel .pitch {
    margin-top: auto;
    z-index: 1;
  }
  .brand-panel .pitch h1 {
    font-size: 26px;
    font-weight: 700;
    margin: 0 0 12px;
    line-height: 1.4;
    letter-spacing: -0.01em;
  }
  .brand-panel .pitch p {
    margin: 0;
    color: rgba(255,255,255,0.78);
    line-height: 1.7;
    font-size: 13px;
  }
  .brand-panel .features {
    margin-top: 24px;
    display: flex; gap: 14px;
    z-index: 1;
  }
  .brand-panel .feature {
    flex: 1;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--r-md);
    padding: 10px 12px;
  }
  .brand-panel .feature .v {
    font-family: "JetBrains Mono", monospace;
    font-weight: 700;
    font-size: 18px;
  }
  .brand-panel .feature .k {
    font-size: 10px;
    color: rgba(255,255,255,0.6);
    margin-top: 1px;
    letter-spacing: 0.02em;
  }

  /* Right form */
  .form-panel {
    padding: 48px 40px;
    display: flex;
    flex-direction: column;
  }
  .form-panel h1 {
    margin: 0 0 6px;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .form-panel p.lead {
    margin: 0 0 26px;
    font-size: 13px;
    color: var(--c-text-muted);
  }
  .form-panel .field {
    margin-bottom: 14px;
  }
  .form-panel .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--c-text-muted);
    margin-bottom: 5px;
    letter-spacing: 0.02em;
  }
  .form-panel .field .input-wrap {
    position: relative;
  }
  .form-panel .field input {
    width: 100%;
    background: var(--c-surface);
    border: 1.5px solid var(--c-border);
    border-radius: var(--r-md);
    padding: 9px 14px 9px 38px;
    font-size: 14px;
    color: var(--c-text);
    font-family: var(--ff-sans);
    line-height: 1.5;
  }
  .form-panel .field input:focus { outline: 2px solid var(--c-primary); outline-offset: -1px; border-color: var(--c-primary); }
  .form-panel .field svg {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--c-text-muted);
    width: 16px; height: 16px;
    stroke-width: 1.6;
  }
  .form-panel .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 18px;
  }
  .form-panel .row label {
    display: flex; align-items: center; gap: 6px;
    color: var(--c-text-muted);
    cursor: pointer;
  }
  .form-panel .row input { accent-color: var(--c-primary); }
  .form-panel .row a {
    color: var(--c-primary);
    text-decoration: none;
    font-weight: 600;
  }
  [data-theme="dark"] .form-panel .row a { color: #c7d2fe; }
  .form-panel .submit {
    width: 100%;
    padding: 11px 14px;
    background: var(--c-primary);
    color: #fff;
    border: none;
    border-radius: var(--r-md);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .form-panel .submit:hover { background: var(--c-primary-hover); }

  .or-row {
    display: flex; align-items: center; gap: 10px;
    margin: 20px 0;
    color: var(--c-text-subtle);
    font-size: 11px;
  }
  .or-row::before, .or-row::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--c-border);
  }
  .sso {
    width: 100%;
    padding: 9px 14px;
    background: var(--c-surface);
    color: var(--c-text);
    border: 1.5px solid var(--c-border);
    border-radius: var(--r-md);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .sso:hover { background: var(--c-surface-2); }

  .legal {
    margin-top: auto;
    padding-top: 24px;
    font-size: 11px;
    color: var(--c-text-subtle);
    text-align: center;
  }

  /* Theme toggle */
  .theme-toggle-fixed {
    position: fixed; top: 18px; right: 22px; z-index: 10;
  }
</style>
</head>
<body data-screen-label="S01 Login">

<div class="theme-toggle-fixed">
  <div class="theme-switch" id="themeSwitch">
    <button class="on" data-theme-set="light"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M17.5 17.5L19 19M5 19l1.5-1.5M17.5 6.5L19 5"/></svg></button>
    <button data-theme-set="dark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg></button>
  </div>
</div>

<div class="login-shell">

  <div class="brand-panel">
    <div class="logo">
      <div class="mark">CL</div>
      <h2>Construction Manager v3<small>株式会社クラップ</small></h2>
    </div>

    <div class="pitch">
      <h1>工事台帳を、<br/>みんなで使えるかたちに。</h1>
      <p>30年続いたExcelの仕事をWebへ。<br/>同時編集・自動集計・スキャン解析を、慣れた業務感覚のままで。</p>

      <div class="features">
        <div class="feature">
          <div class="v">128</div>
          <div class="k">登録案件（2026年度）</div>
        </div>
        <div class="feature">
          <div class="v">86</div>
          <div class="k">業者マスタ</div>
        </div>
        <div class="feature">
          <div class="v">94%</div>
          <div class="k">スキャン精度</div>
        </div>
      </div>
    </div>
  </div>

  <div class="form-panel">
    <h1>サインイン</h1>
    <p class="lead">あなたのアカウントでログインしてください。</p>

    <div class="field">
      <label>メールアドレス</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><path d="M22 6l-10 7L2 6"/></svg>
        <input type="email" placeholder="example@clap-corp.example" value="hisamori@clap-corp.example"/>
      </div>
    </div>

    <div class="field">
      <label>パスワード</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <input type="password" placeholder="********" value="••••••••••••"/>
      </div>
    </div>

    <div class="row">
      <label><input type="checkbox" checked/>ログイン状態を保持</label>
      <a href="#">パスワードをお忘れですか？</a>
    </div>

    <button class="submit">
      サインイン
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>

    <div class="or-row">または</div>

    <button class="sso">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M21.35 11.1H12v3.18h5.59c-.56 2.36-2.55 3.4-5.59 3.4-3.41 0-6.18-2.77-6.18-6.18s2.77-6.18 6.18-6.18c1.5 0 2.86.54 3.92 1.43L18.14 4.5C16.42 3 14.38 2.18 12 2.18 6.6 2.18 2.18 6.6 2.18 12S6.6 21.82 12 21.82c5.7 0 9.6-4.02 9.6-9.66 0-.55-.06-1.07-.16-1.06z"/>
      </svg>
      Google アカウントでサインイン
    </button>

    <div class="legal">
      © 2026 株式会社クラップ · <a href="#" style="color:var(--c-text-muted);text-decoration:none">利用規約</a> · <a href="#" style="color:var(--c-text-muted);text-decoration:none">プライバシー</a>
    </div>
  </div>
</div>

<script>
  (function() {
    const params = new URLSearchParams(location.search);
    if (params.get('theme') === 'dark') {
      document.documentElement.dataset.theme = 'dark';
      document.querySelectorAll('#themeSwitch button').forEach(b => b.classList.toggle('on', b.dataset.themeSet === 'dark'));
    }
  })();
  const ts = document.getElementById('themeSwitch');
  ts.addEventListener('click', e => {
    const b = e.target.closest('button[data-theme-set]');
    if (!b) return;
    document.documentElement.dataset.theme = b.dataset.themeSet;
    ts.querySelectorAll('button').forEach(x => x.classList.toggle('on', x === b));
  });
</script>

</body>
</html>
