<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>Construction Manager v3 — Design</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body { font-family: 'Inter', system-ui, sans-serif; }
  iframe.screen { border: 0; display: block; width: 100%; height: 100%; background: #FAFAF9; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

function Screen({ src }) {
  const [theme, setTheme] = useState('light');
  useEffect(() => {
    const h = (e) => { if (e.data && e.data.type === 'ds-theme') setTheme(e.data.theme); };
    window.addEventListener('message', h);
    return () => window.removeEventListener('message', h);
  }, []);
  const url = src + (src.includes('?') ? '&' : '?') + 'theme=' + theme;
  return <iframe className="screen" src={url} loading="lazy" />;
}

function App() {
  return (
    <DesignCanvas
      title="Construction Manager v3"
      subtitle="株式会社クラップ · 工事台帳Web化プロジェクト  /  Phase 1〜3 + ブラッシュアップ + ハンドオフ済"
    >

      <DCSection id="ds" title="01 · デザインシステム" subtitle="カラー・タイポ・コンポーネント · ライト/ダーク両対応">
        <DCArtboard id="ds-light" label="DS · Light" width={1280} height={1600}><Screen src="screens/design-system.html?theme=light" /></DCArtboard>
        <DCArtboard id="ds-dark" label="DS · Dark" width={1280} height={1600}><Screen src="screens/design-system.html?theme=dark" /></DCArtboard>
      </DCSection>

      <DCSection id="auth" title="02 · 認証" subtitle="S01 ログイン">
        <DCArtboard id="login-light" label="Login · Light" width={1280} height={800}><Screen src="screens/login.html?theme=light" /></DCArtboard>
        <DCArtboard id="login-dark" label="Login · Dark" width={1280} height={800}><Screen src="screens/login.html?theme=dark" /></DCArtboard>
      </DCSection>

      <DCSection id="dash" title="03 · S02 ダッシュボード" subtitle="社長・部長が5秒で全体把握">
        <DCArtboard id="s02-light" label="Dashboard · Light" width={1440} height={1000}><Screen src="screens/dashboard.html?theme=light" /></DCArtboard>
        <DCArtboard id="s02-dark" label="Dashboard · Dark" width={1440} height={1000}><Screen src="screens/dashboard.html?theme=dark" /></DCArtboard>
      </DCSection>

      <DCSection id="projects" title="04 · 案件" subtitle="一覧 → 詳細 → QCDS（サブナビ共通）">
        <DCArtboard id="s03" label="S03 案件一覧" width={1440} height={1200}><Screen src="screens/projects.html?theme=light" /></DCArtboard>
        <DCArtboard id="s04" label="S04 案件詳細（サブナビ + 取決見通表 業者ごと）" width={1440} height={2200}><Screen src="screens/project-detail.html?theme=light" /></DCArtboard>
        <DCArtboard id="s05" label="S05 QCDS" width={1440} height={2400}><Screen src="screens/qcds.html?theme=light" /></DCArtboard>
      </DCSection>

      <DCSection id="quote-order" title="05 · 帳票系 画面（見積・注文）" subtitle="承認フロー + 印影プレビュー + サブナビ">
        <DCArtboard id="s06" label="S06 見積書 + 承認フロー" width={1440} height={2100}><Screen src="screens/quote.html?theme=light" /></DCArtboard>
        <DCArtboard id="s07" label="S07 注文書（ステータス + 請書発行）" width={1440} height={1700}><Screen src="screens/order.html?theme=light" /></DCArtboard>
        <DCArtboard id="ap-req" label="承認依頼モーダル" width={1280} height={780}><Screen src="screens/approval-modal.html?theme=light" /></DCArtboard>
        <DCArtboard id="ap-rej" label="差戻しモーダル" width={1280} height={780}><Screen src="screens/approval-modal.html?theme=light&mode=reject" /></DCArtboard>
        <DCArtboard id="s17" label="S17 承認待ち一覧" width={1440} height={1100}><Screen src="screens/approvals.html?theme=light" /></DCArtboard>
        <DCArtboard id="s18" label="S18 印影設定" width={1440} height={1000}><Screen src="screens/stamp-settings.html?theme=light" /></DCArtboard>
      </DCSection>

      <DCSection id="scan" title="06 · 業者見積スキャン（AI）" subtitle="一括操作 + 大きな案件選択 + 転記トースト">
        <DCArtboard id="s11" label="S11 一覧 + 一括操作バー" width={1440} height={1500}><Screen src="screens/scan-upload.html?theme=light" /></DCArtboard>
        <DCArtboard id="s12-empty" label="S12 レビュー（案件未選択 警告）" width={1600} height={1100}><Screen src="screens/scan-review.html?theme=light&state=empty" /></DCArtboard>
        <DCArtboard id="s12" label="S12 レビュー（転記完了トースト）" width={1600} height={1800}><Screen src="screens/scan-review.html?theme=light" /></DCArtboard>
      </DCSection>

      <DCSection id="vendors" title="07 · 業者マスタ" subtitle="一覧 + 詳細（単価履歴）">
        <DCArtboard id="s13" label="S13 業者マスタ" width={1440} height={1000}><Screen src="screens/vendors.html?theme=light" /></DCArtboard>
        <DCArtboard id="s14" label="S14 業者詳細 + 単価推移" width={1440} height={1300}><Screen src="screens/vendor-detail.html?theme=light" /></DCArtboard>
      </DCSection>

      <DCSection id="other" title="08 · その他運用画面" subtitle="Excelインポート / 管理">
        <DCArtboard id="s15" label="S15 Excelインポート（dry-run）" width={1440} height={1300}><Screen src="screens/import.html?theme=light" /></DCArtboard>
        <DCArtboard id="s16" label="S16 管理（ユーザー・印紙税）" width={1440} height={1500}><Screen src="screens/admin.html?theme=light" /></DCArtboard>
      </DCSection>

      <DCSection id="print" title="09 · 帳票出力（A4 PDF印刷向け）" subtitle="顧客提出書類 · WeasyPrint 想定">
        <DCArtboard id="quote-cover" label="見積書 表紙（承認済）" width={794} height={1123}><Screen src="print/quote-cover.html" /></DCArtboard>
        <DCArtboard id="order-print" label="注文書（兼 請書）" width={794} height={1123}><Screen src="print/order.html" /></DCArtboard>
        <DCArtboard id="invoice-print" label="請求書（適格請求書）" width={794} height={1123}><Screen src="print/invoice.html" /></DCArtboard>
      </DCSection>

      <DCSection id="dark" title="10 · ダーク版" subtitle="主要画面のダーク表示確認">
        <DCArtboard id="s02-d" label="Dashboard · Dark" width={1440} height={1000}><Screen src="screens/dashboard.html?theme=dark" /></DCArtboard>
        <DCArtboard id="s04-d" label="案件詳細 · Dark" width={1440} height={2200}><Screen src="screens/project-detail.html?theme=dark" /></DCArtboard>
        <DCArtboard id="s07-d" label="注文書 · Dark" width={1440} height={1700}><Screen src="screens/order.html?theme=dark" /></DCArtboard>
        <DCArtboard id="s12-d" label="スキャンレビュー · Dark" width={1600} height={1800}><Screen src="screens/scan-review.html?theme=dark" /></DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
