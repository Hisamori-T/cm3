services:
  # PostgreSQL 16 - メインデータベース
  cmv3-db:
    image: postgres:16-alpine
    container_name: cmv3-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cmv3}
      POSTGRES_USER: ${POSTGRES_USER:-cmv3user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cmv3pass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cmv3user} -d ${POSTGRES_DB:-cmv3}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis 7 - キャッシュ＆Celeryキュー
  cmv3-redis:
    image: redis:7-alpine
    container_name: cmv3-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-cmv3redis}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-cmv3redis}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # Adminer - DB管理UI（開発用）
  adminer:
    image: adminer:latest
    container_name: cmv3-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: cmv3-db
    depends_on:
      cmv3-db:
        condition: service_healthy

  # FastAPI バックエンド（Step 1-3〜）
  # 注意: Google Drive上のプロジェクトのためバインドマウント非対応
  # コード変更後は `docker compose -f docker-compose.dev.yml up --build cmv3-api` で再ビルド
  cmv3-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cmv3-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://cmv3user:cmv3pass@cmv3-db:5432/cmv3
      REDIS_URL: redis://:cmv3redis@cmv3-redis:6379/0
      JWT_SECRET: dev_jwt_secret_change_in_production_32c
      ALLOWED_ORIGINS: http://localhost:3000
      APP_ENV: development
      LOG_LEVEL: DEBUG
      UPLOAD_DIR: /tmp/cmv3_uploads
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - scan_uploads:/tmp/cmv3_uploads
    ports:
      - "8000:8000"
    depends_on:
      cmv3-db:
        condition: service_healthy
      cmv3-redis:
        condition: service_healthy

  # Next.js フロントエンド（Step 1-4〜）
  # 注意: Google Drive上のプロジェクトのためバインドマウント非対応
  # コード変更後は `docker compose -f docker-compose.dev.yml up --build cmv3-web` で再ビルド
  cmv3-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cmv3-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - cmv3-api

  # Celery ワーカー（Step 3-2〜）
  cmv3-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cmv3-worker
    command: ["uv", "run", "celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://cmv3user:cmv3pass@cmv3-db:5432/cmv3
      REDIS_URL: redis://:cmv3redis@cmv3-redis:6379/0
      JWT_SECRET: dev_jwt_secret_change_in_production_32c
      APP_ENV: development
      LOG_LEVEL: DEBUG
      UPLOAD_DIR: /tmp/cmv3_uploads
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - scan_uploads:/tmp/cmv3_uploads
    depends_on:
      cmv3-db:
        condition: service_healthy
      cmv3-redis:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
  scan_uploads:
    driver: local

networks:
  default:
    name: cmv3-network
