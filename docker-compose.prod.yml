services:
  # ── Redis（Celery キュー）─────────────────────────────────────────────────
  cmv3-redis:
    image: redis:7-alpine
    container_name: cmv3-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── FastAPI バックエンド ──────────────────────────────────────────────────
  cmv3-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cmv3-api
    restart: unless-stopped
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL:   ${DATABASE_URL}
      REDIS_URL:      ${REDIS_URL}
      JWT_SECRET:     ${JWT_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://cmv3.fact-ally.com}
      APP_ENV:        production
      LOG_LEVEL:      ${LOG_LEVEL:-INFO}
      UPLOAD_DIR:     /tmp/cmv3_uploads
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - scan_uploads:/tmp/cmv3_uploads
    depends_on:
      cmv3-redis:
        condition: service_healthy

  # ── Next.js フロントエンド ────────────────────────────────────────────────
  cmv3-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://cmv3.fact-ally.com}
    container_name: cmv3-web
    restart: unless-stopped
    depends_on:
      - cmv3-api

  # ── Celery ワーカー ───────────────────────────────────────────────────────
  cmv3-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cmv3-worker
    command: ["uv", "run", "celery", "-A", "app.tasks.celery_app", "worker",
              "--loglevel=info", "--concurrency=2"]
    restart: unless-stopped
    environment:
      DATABASE_URL:   ${DATABASE_URL}
      REDIS_URL:      ${REDIS_URL}
      JWT_SECRET:     ${JWT_SECRET}
      APP_ENV:        production
      LOG_LEVEL:      ${LOG_LEVEL:-INFO}
      UPLOAD_DIR:     /tmp/cmv3_uploads
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - scan_uploads:/tmp/cmv3_uploads
    depends_on:
      cmv3-redis:
        condition: service_healthy

  # ── Nginx リバースプロキシ（内部ルーティング）─────────────────────────────
  cmv3-nginx:
    image: nginx:alpine
    container_name: cmv3-nginx
    restart: unless-stopped
    ports:
      - "8005:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - cmv3-api
      - cmv3-web

volumes:
  scan_uploads:
    driver: local

networks:
  default:
    name: cmv3-prod-network
